<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>URL Saver</title>
  <style>
    body {
      margin: 0;
      background: #f6f7f9;
      color: #17202a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(560px, calc(100vw - 32px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      place-items: center;
      text-align: center;
    }

    a {
      color: #2463eb;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <div>
      <h1>URL Saver</h1>
      <p>パスワード再設定リンクを開いている場合は、自動で再設定画面へ移動します。</p>
      <p><a id="reset-link" href="/auth/reset-password">パスワード再設定画面を開く</a></p>
    </div>
  </main>
  <script>
    const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
    const queryParams = new URLSearchParams(window.location.search);
    const hasRecoveryToken =
      hashParams.get("type") === "recovery" ||
      hashParams.has("access_token") ||
      queryParams.has("code");

    if (hasRecoveryToken) {
      window.location.replace("/auth/reset-password" + window.location.search + window.location.hash);
    }
  </script>
</body>
</html>
