<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>URL Saver パスワード再設定</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #657080;
      --line: #d9dee7;
      --primary: #2463eb;
      --danger: #b42318;
      --success: #047857;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(480px, calc(100vw - 32px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      place-items: center;
      padding: 32px 0;
    }

    section {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(24, 32, 42, .05);
    }

    h1,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 25px;
      line-height: 1.25;
    }

    form,
    label {
      display: grid;
      gap: 12px;
    }

    label {
      color: #2f3a48;
      font-weight: 700;
    }

    input,
    button {
      width: 100%;
      border-radius: 8px;
      font: inherit;
    }

    input {
      border: 1px solid var(--line);
      padding: 12px;
      background: #fff;
      color: var(--text);
    }

    button {
      border: 0;
      padding: 12px 14px;
      background: var(--primary);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    button:disabled {
      opacity: .55;
      cursor: wait;
    }

    .muted {
      color: var(--muted);
    }

    .notice {
      margin: 14px 0;
      border-radius: 8px;
      padding: 12px;
      line-height: 1.55;
    }

    .error {
      background: #fef3f2;
      color: var(--danger);
    }

    .success {
      background: #ecfdf3;
      color: var(--success);
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>パスワード再設定</h1>
      <p class="muted">新しいパスワードを入力してください。</p>
      <p id="status" class="notice">再設定リンクを確認しています...</p>
      <form id="form" hidden>
        <label>
          新しいパスワード
          <input id="password" type="password" autocomplete="new-password" minlength="8" required>
        </label>
        <label>
          新しいパスワード（確認）
          <input id="confirm-password" type="password" autocomplete="new-password" minlength="8" required>
        </label>
        <button id="submit" type="submit">パスワードを変更する</button>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.53.0/dist/umd/supabase.min.js" integrity="sha384-H9dj4GG/hgfwNjlYa740FF9geXbzyXSgepgoobvIAW49UUAcfk+GAiBnLDIs4hRh" crossorigin="anonymous"></script>
  <script>
    const SUPABASE_URL = "https://xocumgxbylmpoobfqows.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_sqa8-DQgzLsiy34XygAjnQ_ebx28Wsb";

    const status = document.getElementById("status");
    const form = document.getElementById("form");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirm-password");
    const submit = document.getElementById("submit");
    let recoveryReady = false;
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        detectSessionInUrl: true,
        persistSession: false,
        autoRefreshToken: false,
      },
    });

    function show(message, type) {
      status.textContent = message;
      status.className = "notice " + (type || "");
    }

    function enableForm() {
      recoveryReady = true;
      form.hidden = false;
      show("リンク確認が完了しました。新しいパスワードを設定できます。", "success");
    }

    async function initializeRecoverySession() {
      const code = new URLSearchParams(window.location.search).get("code");
      if (code) {
        const { error } = await client.auth.exchangeCodeForSession(code);
        if (error) throw error;
        enableForm();
        return;
      }

      const { data, error } = await client.auth.getSession();
      if (error) throw error;
      if (!data.session || !recoveryReady) {
        throw new Error("再設定リンクの有効期限が切れているか、リンクが正しくありません。もう一度メールを送信してください。");
      }
    }

    client.auth.onAuthStateChange((event) => {
      if (event === "PASSWORD_RECOVERY") {
        enableForm();
      }
    });

    setTimeout(() => {
      initializeRecoverySession()
      .catch((error) => {
        if (!recoveryReady) {
          form.hidden = true;
          show(error.message || "再設定リンクを確認できませんでした。もう一度メールを送信してください。", "error");
        }
      });
    }, 500);

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (password.value.length < 8) {
        show("パスワードは8文字以上で入力してください。", "error");
        return;
      }
      if (password.value !== confirmPassword.value) {
        show("確認用パスワードが一致していません。", "error");
        return;
      }

      submit.disabled = true;
      show("パスワードを変更しています...", "");
      const { error } = await client.auth.updateUser({ password: password.value });
      submit.disabled = false;

      if (error) {
        show(error.message || "パスワードを変更できませんでした。", "error");
        return;
      }

      password.value = "";
      confirmPassword.value = "";
      form.hidden = true;
      await client.auth.signOut();
      show("パスワードを変更しました。管理画面に戻って、新しいパスワードでサインインしてください。", "success");
    });

    function clearRecoverySession() {
      if (recoveryReady) {
        client.auth.signOut({ scope: "local" }).catch(() => {});
      }
    }

    window.addEventListener("pagehide", clearRecoverySession);
    window.addEventListener("beforeunload", clearRecoverySession);
  </script>
</body>
</html>
