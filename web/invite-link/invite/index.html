<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UrlSaver invite</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #071018; color: #f4f7fb; }
    main { max-width: 560px; margin: 0 auto; padding: 56px 22px; }
    a { color: inherit; }
    .button { display: inline-block; margin-top: 22px; padding: 14px 18px; border-radius: 999px; background: #65b4ff; color: #06101a; font-weight: 800; text-decoration: none; }
    .code { margin-top: 18px; color: #aebbd0; overflow-wrap: anywhere; }
  </style>
</head>
<body>
  <main>
    <h1>UrlSaver の共有タグに参加</h1>
    <p>アプリが自動で開かない場合は、下のボタンを押してください。</p>
    <a id="open-app" class="button" href="#">UrlSaverで開く</a>
    <p id="token" class="code"></p>
  </main>
  <script>
    const parts = window.location.pathname.split('/').filter(Boolean);
    const token = parts[0] === 'invite' ? parts.slice(1).join('/') : '';
    const appUrl = token ? `urlsaver://invite/${encodeURIComponent(token)}` : 'urlsaver://invite';
    const link = document.getElementById('open-app');
    link.href = appUrl;
    document.getElementById('token').textContent = token ? `招待コード: ${token}` : '招待コードが見つかりませんでした。';
    if (token) {
      setTimeout(() => { window.location.href = appUrl; }, 250);
    }
  </script>
</body>
</html>
