<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>URL Saver 優待コード</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f6f7f9; color: #17202a; }
    main { max-width: 560px; margin: 0 auto; padding: 56px 22px; }
    a { color: inherit; }
    .button { display: inline-block; margin-top: 22px; padding: 14px 18px; border-radius: 8px; background: #2463eb; color: white; font-weight: 800; text-decoration: none; }
    .code { margin-top: 18px; padding: 12px; border: 1px solid #d9dee7; border-radius: 8px; background: white; color: #253041; overflow-wrap: anywhere; }
    .muted { color: #657080; }
  </style>
</head>
<body>
  <main>
    <h1>URL Saver 優待Proを受け取る</h1>
    <p>アプリが自動で開かない場合は、下のボタンを押してください。</p>
    <a id="open-app" class="button" href="#">URL Saverで受け取る</a>
    <p id="code" class="code"></p>
    <p class="muted">開けない場合は、このコードをアプリのプロフィール/クラウド画面に入力してください。</p>
  </main>
  <script>
    const params = new URLSearchParams(window.location.hash.replace(/^#/, ''));
    const code = params.get('code') || '';
    const appUrl = code ? `urlsaver://promo?code=${encodeURIComponent(code)}` : 'urlsaver://promo';
    const link = document.getElementById('open-app');
    link.href = appUrl;
    document.getElementById('code').textContent = code ? `優待コード: ${code}` : '優待コードを確認できませんでした。';
    if (code) {
      setTimeout(() => { window.location.href = appUrl; }, 250);
    }
  </script>
</body>
</html>
