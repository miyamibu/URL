name: Account Deletion Page

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/account-deletion-request.html"
      - ".github/workflows/account-deletion-page.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: account-deletion-page
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Prepare static page
        run: |
          mkdir -p _site/account-deletion
          cp docs/account-deletion-request.html _site/account-deletion/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
