<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>URL Saver Account Deletion</title>
</head>
<body>
  <main>
    <h1>URL Saver アカウント削除</h1>
    <p>shared-tag cloud アカウントの削除依頼ページです。</p>
    <p>運用環境では、このファイルを公開 HTTPS URL で配信し、Google Play の account deletion URL として設定してください。</p>
    <ol>
      <li>アプリ内の shared-tag cloud auth 画面から削除を開始してください。</li>
      <li>アプリを使えない場合は、サポート窓口に削除対象のメールアドレスを添えて依頼してください。</li>
      <li>他のメンバーがいる shared tag の owner は、所有権を移譲するまで削除できません。</li>
    </ol>
  </main>
</body>
</html>
